name: Promote to Production

# Use this when a dev image has already been validated and you want to promote
# it to prod WITHOUT rebuilding. The image built from develop-<sha> is retagged
# as main-<sha> in the prod ECR and deployed — no source rebuild needed.
#
# Use deploy-prod.yml instead when you want a clean build from main HEAD.

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Short commit SHA to promote (e.g. a1b2c3d) — must exist as develop-<sha> in dev ECR'
        required: true
      approve_promotion:
        description: 'Type "promote-production" to confirm'
        required: true
        default: 'cancel'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_DEV: practice-node-app-dev
  ECR_REPOSITORY_PROD: practice-node-app-prod
  EKS_CLUSTER_NAME: practice-node-app-prod

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Manual approval
        run: |
          if [ "${{ github.event.inputs.approve_promotion }}" != "promote-production" ]; then
            echo "Promotion not confirmed. Type 'promote-production' to confirm."
            exit 1
          fi
          echo "Production promotion confirmed!"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify source image exists in dev ECR
        id: tags
        run: |
          SHA="${{ github.event.inputs.commit_sha }}"
          DEV_TAG="develop-${SHA}"
          PROD_TAG="main-${SHA}"
          DEV_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_DEV }}:${DEV_TAG}"
          PROD_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PROD }}:${PROD_TAG}"

          if ! aws ecr describe-images \
              --repository-name ${{ env.ECR_REPOSITORY_DEV }} \
              --image-ids imageTag=$DEV_TAG \
              --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "Image ${DEV_IMAGE} not found in dev ECR."
            echo "Make sure the commit was deployed to dev before promoting."
            exit 1
          fi

          echo "dev-tag=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "prod-tag=$PROD_TAG" >> $GITHUB_OUTPUT
          echo "dev-image=$DEV_IMAGE" >> $GITHUB_OUTPUT
          echo "prod-image=$PROD_IMAGE" >> $GITHUB_OUTPUT
          echo "Source image verified: $DEV_IMAGE"

      - name: Retag image from dev ECR to prod ECR
        run: |
          # Pull the validated dev image and push it to prod ECR under a prod tag
          docker pull ${{ steps.tags.outputs.dev-image }}
          docker tag  ${{ steps.tags.outputs.dev-image }} ${{ steps.tags.outputs.prod-image }}
          docker push ${{ steps.tags.outputs.prod-image }}
          echo "Retagged ${{ steps.tags.outputs.dev-tag }} → ${{ steps.tags.outputs.prod-tag }} in prod ECR"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.tags.outputs.prod-image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/tmp,/var'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Save previous deployment for rollback
        id: backup
        run: |
          if kubectl get deployment practice-node-app-prod -n practice-app-prod 2>/dev/null; then
            echo "backup-saved=true" >> $GITHUB_OUTPUT
          else
            echo "backup-saved=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production
        run: |
          kubectl apply -f k8s/environments/prod/all-in-one.yaml
          kubectl set image deployment/practice-node-app-prod \
            node-app=${{ steps.tags.outputs.prod-image }} \
            -n practice-app-prod

      - name: Wait for rollout
        run: kubectl rollout status deployment/practice-node-app-prod -n practice-app-prod --timeout=600s

      - name: Health check
        run: |
          kubectl wait --for=condition=ready pod \
            -l app=practice-node-app-prod -n practice-app-prod --timeout=300s

          ALB_URL=$(kubectl get ingress practice-node-app-prod -n practice-app-prod \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

          if [ -n "$ALB_URL" ]; then
            for i in {1..10}; do
              if curl -f -s http://$ALB_URL/health > /dev/null; then
                echo "ALB health check passed"
                break
              fi
              echo "Waiting for ALB... ($i/10)"
              sleep 30
            done
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          if [ "${{ steps.backup.outputs.backup-saved }}" == "true" ]; then
            kubectl rollout undo deployment/practice-node-app-prod -n practice-app-prod || true
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Promote to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dev tag:** \`${{ steps.tags.outputs.dev-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Prod tag:** \`${{ steps.tags.outputs.prod-tag }}\`" >> $GITHUB_STEP_SUMMARY
