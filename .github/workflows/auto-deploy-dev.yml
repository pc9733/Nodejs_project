name: Auto Deploy to Development

on:
  workflow_run:
    workflows: ["Node CI"]
    branches: [ develop ]
    types: [ completed ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: practice-node-app-dev
  EKS_CLUSTER_NAME: practice-node-app-dev

jobs:
  deploy:
    # Only deploy if tests passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          driver-opts: image=moby/buildkit:rootless

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=develop-
            type=raw,value=latest

      - name: Determine image tag
        id: image_tag
        run: |
          TAG="develop-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "Using image tag: $TAG"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./node-app
          file: ./node-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image_tag.outputs.tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '/tmp,/var'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Verify image in ECR
        run: |
          IMAGE_TAG="${{ steps.image_tag.outputs.tag }}"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG"

          if aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --image-ids imageTag=$IMAGE_TAG --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "✅ Image $FULL_IMAGE found in ECR"
          else
            echo "❌ Image $FULL_IMAGE not found in ECR"
            echo "Available images:"
            aws ecr list-images --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} --query 'imageIds[].imageTag' --output table
            exit 1
          fi

      - name: Deploy to development
        run: |
          echo "🚀 Auto-deploying to development environment..."
          echo "Triggered by: ${{ github.event.workflow_run.event }} on ${{ github.event.workflow_run.head_branch }}"

          # Apply development manifests
          kubectl apply -f k8s/environments/dev/all-in-one.yaml

          # Update deployment with latest image
          kubectl set image deployment/practice-node-app-dev node-app=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image_tag.outputs.tag }} -n practice-app-dev

          echo "✅ Development deployment initiated!"

      - name: Wait for rollout
        run: |
          echo "⏳ Waiting for deployment rollout..."
          kubectl rollout status deployment/practice-node-app-dev -n practice-app-dev --timeout=300s

      - name: Health check
        run: |
          echo "🔍 Performing health check..."
          kubectl wait --for=condition=ready pod -l app=practice-node-app-dev -n practice-app-dev --timeout=300s

          # Test service connectivity
          kubectl run test-pod --image=curlimages/curl --rm -i --restart=Never -- \
            curl -f http://practice-node-app-dev.practice-app-dev.svc.cluster.local/health || echo "Health check failed, but deployment may still be working"

      - name: Get deployment info
        run: |
          echo "📊 Deployment Information:"
          kubectl get pods -n practice-app-dev -l app=practice-node-app-dev
          kubectl get services -n practice-app-dev
          kubectl get ingress -n practice-app-dev

      - name: Cleanup old ECR images
        run: |
          echo "🧹 Cleaning up old ECR images (keeping last 10)..."
          aws ecr describe-images --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} \
            --query 'sort_by(imageDetails, &imagePushedAt)[:-10].imageDigest' \
            --output text | while read -r digest; do
            aws ecr batch-delete-image --repository-name ${{ env.ECR_REPOSITORY }} --image-ids imageDigest=$digest || true
          done

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Auto-Deploy to Development Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** Successful CI on \`${{ github.event.workflow_run.head_branch }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ steps.image_tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Test the deployment in dev environment" >> $GITHUB_STEP_SUMMARY
            echo "2. View logs: \`kubectl logs -f deployment/practice-node-app-dev -n practice-app-dev\`" >> $GITHUB_STEP_SUMMARY
            echo "3. When ready, promote to production using \`deploy-prod.yml\` workflow" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Check workflow logs above" >> $GITHUB_STEP_SUMMARY
            echo "2. Verify EKS cluster is running" >> $GITHUB_STEP_SUMMARY
            echo "3. Check pod status: \`kubectl get pods -n practice-app-dev\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Auto-deployment to development failed!"
          echo "🔍 Check the workflow logs for details"
          echo "📋 Commit: ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.event.workflow_run.head_branch }}"
