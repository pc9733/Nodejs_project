name: Node CI

on:
  # Run on pull requests to main branches
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'node-app/**'
      - 'Dockerfile'
      - 'package*.json'
      - '.github/workflows/node-ci.yml'

  # Run on push to develop (only if app code changes)
  push:
    branches: [ develop ]
    paths:
      - 'node-app/**'
      - 'Dockerfile'
      - 'package*.json'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    # Skip if commit message contains [skip ci] or [ci skip]
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: node-app/package-lock.json
      - name: Install dependencies
        working-directory: node-app
        run: npm ci
      - name: Run tests
        working-directory: node-app
        run: npm test || echo "No tests configured, skipping..."
      - name: Smoke test
        working-directory: node-app
        run: node -e "require('./server'); console.log('Server module loads successfully')"
