name: Node CI

on:
  # Run on every push to feature branches, develop, and main
  push:
    branches:
      - 'feature/**'
      - develop
      - main
    paths:
      - 'node-app/**'
      - '.github/workflows/node-ci.yml'

  # Run on PRs targeting develop or main (must pass before merge)
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'node-app/**'
      - '.github/workflows/node-ci.yml'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    # Skip if commit message contains [skip ci] or [ci skip]
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: node-app/package-lock.json
      - name: Install dependencies
        working-directory: node-app
        run: npm ci
      - name: Run tests
        working-directory: node-app
        run: npm test
      - name: Smoke test
        working-directory: node-app
        run: node -e "require('./server'); console.log('Server module loads successfully')"
