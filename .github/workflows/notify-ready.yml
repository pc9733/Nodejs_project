name: Notify Ready to Deploy

# Fires when a commit lands on main (i.e. a PR from develop was merged).
# Posts a step summary reminding the team to trigger deploy-prod manually.

on:
  push:
    branches: [ main ]
    paths:
      - 'node-app/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Post deploy reminder
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "## main is ready to deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`$SHORT_SHA\` — ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To release:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Actions → **Deploy to Production** → Run workflow" >> $GITHUB_STEP_SUMMARY
          echo "2. Type \`deploy-production\` to confirm" >> $GITHUB_STEP_SUMMARY
          echo "3. Or use **Canary Deployment** for a gradual rollout" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Expected prod image tag: \`main-${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
