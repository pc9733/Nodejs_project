# =================================================================
# DEVELOPMENT ENVIRONMENT KUBERNETES MANIFESTS
# Lightweight configuration for development/testing
# =================================================================

---
# Namespace for development
apiVersion: v1
kind: Namespace
metadata:
  name: practice-app-dev
  labels:
    environment: development
    project: practice-node-app

---
# Development Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: practice-node-app-dev
  namespace: practice-app-dev
  labels:
    app: practice-node-app-dev
    environment: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: practice-node-app-dev
  template:
    metadata:
      labels:
        app: practice-node-app-dev
        environment: development
    spec:
      containers:
      - name: node-app
        image: 602202572057.dkr.ecr.us-east-1.amazonaws.com/practice-node-app-dev:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "development"
        - name: PORT
          value: "3000"
        - name: LOG_LEVEL
          value: "debug"
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
          limits:
            memory: "256Mi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
# Development Service
apiVersion: v1
kind: Service
metadata:
  name: practice-node-app-dev
  namespace: practice-app-dev
  labels:
    app: practice-node-app-dev
    environment: development
spec:
  selector:
    app: practice-node-app-dev
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
# Development Ingress (Internal Only)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: practice-node-app-dev
  namespace: practice-app-dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  labels:
    app: practice-node-app-dev
    environment: development
spec:
  rules:
  - host: practice-app-dev.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: practice-node-app-dev
            port:
              number: 80

---
# Development ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: practice-app-config-dev
  namespace: practice-app-dev
  labels:
    environment: development
data:
  NODE_ENV: "development"
  LOG_LEVEL: "debug"
  API_TIMEOUT: "30000"
  DB_HOST: "localhost"
  DB_PORT: "5432"
  REDIS_HOST: "localhost"
  REDIS_PORT: "6379"

---
# Development Secrets - Fetched from AWS Parameter Store via External Secrets Operator
# IMPORTANT: Secrets are no longer hardcoded. They are pulled from AWS Systems Manager Parameter Store.
# Prerequisites:
#   1. External Secrets Operator must be installed (handled by Terraform)
#   2. Parameters must exist in AWS SSM Parameter Store at:
#      - /practice-node-app-dev/dev/db-password
#      - /practice-node-app-dev/dev/api-key
#      - /practice-node-app-dev/dev/jwt-secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: practice-app-secrets-dev
  namespace: practice-app-dev
  labels:
    environment: development
spec:
  secretStoreRef:
    name: aws-parameter-store-dev
    kind: SecretStore
  target:
    name: practice-app-secrets-dev
    creationPolicy: Owner
  refreshInterval: 1h
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /practice-node-app-dev/dev/db-password
    - secretKey: API_KEY
      remoteRef:
        key: /practice-node-app-dev/dev/api-key
    - secretKey: JWT_SECRET
      remoteRef:
        key: /practice-node-app-dev/dev/jwt-secret

---
# ServiceAccount for External Secrets Operator (required for IRSA)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: practice-app-dev
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::602202572057:role/practice-node-app-dev-external-secrets-operator

---

# Datadog Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: datadog
  labels:
    app: datadog-agent
    environment: development

---
# ServiceAccount for External Secrets in Datadog namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: datadog
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::602202572057:role/practice-node-app-dev-external-secrets-operator

---
# Datadog Secrets - Fetched from AWS Parameter Store
# Parameters must exist at:
#   - /practice-node-app-dev/dev/datadog-api-key
#   - /practice-node-app-dev/dev/datadog-app-key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: datadog-secret
  namespace: datadog
spec:
  secretStoreRef:
    name: aws-parameter-store-datadog
    kind: SecretStore
  target:
    name: datadog-secret
    creationPolicy: Owner
  refreshInterval: 1h
  data:
    - secretKey: api-key
      remoteRef:
        key: /practice-node-app-dev/dev/datadog-api-key
    - secretKey: app-key
      remoteRef:
        key: /practice-node-app-dev/dev/datadog-app-key

---
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    clusterName: practice-node-app-dev
    site: datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
      appSecret:
        secretName: datadog-secret
        keyName: app-key
    tags:
      - env:dev
      - service:practice-node-app
  features:
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    kubeStateMetricsCore:
      enabled: true
    logCollection:
      enabled: true
  

---
