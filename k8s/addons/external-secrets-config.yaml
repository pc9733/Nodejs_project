# =================================================================
# EXTERNAL SECRETS OPERATOR CONFIGURATION
# -----------------------------------------------------------------
# This file configures External Secrets Operator to fetch secrets
# from AWS Systems Manager Parameter Store
# =================================================================

---
# SecretStore for Development Environment
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store-dev
  namespace: practice-app-dev
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets

---
# SecretStore for Production Environment
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store-prod
  namespace: practice-app-prod
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets

---
# SecretStore for Practice-App Namespace (for service-discovery.yml)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store
  namespace: practice-app
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets

---
# SecretStore for Datadog Namespace
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store-datadog
  namespace: datadog
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
